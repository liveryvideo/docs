<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Livery Video Docs</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Livery Video documentation." />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />

    <!-- Docsify v5 is pinned to a release candidate (no stable @5 published yet). -->
    <!-- Once Docsify 5.0.0 ships, replace docsify@5.0.0-rc.4 with docsify@5 throughout. -->
    <!-- Docsify v5 core theme (always dark via core-dark add-on) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/themes/core.min.css" />
    <!-- Core Dark (add-on) - loaded unconditionally to keep the site dark -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/themes/addons/core-dark.min.css" />

    <style>
        /* Make logo work in light theme */
        /* .app-name img {
        filter: drop-shadow(1px 1px 2px grey);
      } */

        /* Make Nav Bar more clear */
        nav.app-nav.no-badge {
            top: 0;
            left: 0;
            right: 0;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--sidebar-border-color);
            padding: 10px;
            /* Make space for menu items so they don't extend beyond the right side of the page */
            padding-right: 60px;
            z-index: 10;
        }

        nav.app-nav.no-badge>ul>li {
            font-weight: bold;
        }

        nav.app-nav.no-badge>ul>li>ul {
            font-weight: normal;
        }

        :root {
            /* Brand theme color (magenta hue ~300, formerly docsify-themeable --theme-hue: 300) */
            --theme-color: hsl(300, 50%, 50%);

            /* See: https://docsify.js.org/#/themes?id=customization */
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script>
        const fetchText = (url, init) =>
            fetch(url, init).then((response) => response.text());

        const deprecated = (path) =>
            `# Deprecated page\nPlease use the following path instead: [${path}](${path})`;

        window.$docsify = {
            alias: {
                '/.*/_navbar.md': '/_navbar.md',
            },
            auto2top: true,
            loadNavbar: true,
            logo: 'logo.png',
            maxLevel: 3,
            mergeNavbar: true,
            name: 'Livery Video Docs',
            nameLink: '/',
            relativePath: true,
            requestHeaders: {
                'cache-control': 'no-cache',
            },
            // Docsify v5's history router is broken in the current 5.x release
            // candidates (see https://github.com/docsifyjs/docsify), so we use hash
            // mode. Revert to 'history' once a fixed Docsify v5 is published.
            routerMode: 'hash',
            routes: {
                // Load markdown from one of our @liveryvideo/* NPM packages
                '/npm/(.*)': (route, matched, next) => {
                    let path = matched[1];
                    if (path.endsWith('/')) {
                        path += 'index';
                    }
                    fetchText(
                        `https://cdn.jsdelivr.net/npm/@liveryvideo/${path}.md`,
                    ).then(next);
                },

                // Deprecated pages
                '/interactive-bridge-changelog': () =>
                    deprecated('/npm/interactive-bridge/CHANGELOG'),
                '/interactive-sdk': () => deprecated('/interactive-bridge'),
                '/interactive-sdk-changelog': () =>
                    deprecated('/npm/interactive-bridge/CHANGELOG'),
                '/web-player-changelog': () => deprecated('/npm/player/CHANGELOG'),
                '/web-sdk': () => deprecated('/web-player'),
                '/web-sdk-changelog': () => deprecated('/npm/player/CHANGELOG'),

                // Work around notFoundPage not working with routerMode history and server returning index.html instead of 404
                '.*': (route, matched, next) => {
                    const init = { headers: window.$docsify.requestHeaders };
                    fetchText(`${route === '/' ? '/README' : route}.md`, init).then(
                        (text) => {
                            if (text.startsWith('<!DOCTYPE html>')) {
                                fetchText('_404.md', init).then(next);
                            } else {
                                next(text);
                            }
                        },
                    );
                },
            },
            search: {
                depth: 6,
                namespace: 'livery-video-docs',
                paths: [
                    // Make sure to add all paths that should be searchable here
                    '/android-sdk',
                    '/customer-interactive-api',
                    '/customer-video-api',
                    '/embed',
                    '/frictionless-login',
                    '/guides',
                    '/interactive-bridge',
                    '/interactive-portal',
                    '/ios-sdk',
                    '/README',
                    '/security',
                    '/video-ingest',
                    '/video-portal',
                    '/web-player',
                ],
            },
           
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/docsify.min.js"></script>

    <!-- https://docsify.js.org/#/plugins?id=full-text-search -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/plugins/search.min.js"></script>

    <!-- https://docsify.js.org/#/plugins?id=copy-to-clipboard -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>

    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-groovy.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-swift.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>

    <!-- docsify-tabs (latest v1.x.x) -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>

    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true });
        window.mermaid = mermaid;
    </script>
</body>

</html>
