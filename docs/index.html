<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Livery Video Docs</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Livery Video documentation." />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />

    <!-- Themes (light + dark) -->
    <!-- <link
      rel="stylesheet"
      media="(prefers-color-scheme: light)"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
    /> -->
    <!-- media="(prefers-color-scheme: dark)" -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css" />

    <style>
        /* Make logo work in light theme */
        /* .app-name img {
        filter: drop-shadow(1px 1px 2px grey);
      } */

        /* Make Nav Bar more clear */
        nav.app-nav.no-badge {
            top: 0;
            left: 0;
            right: 0;
            background: var(--sidebar-background);
            border-bottom: 1px solid var(--sidebar-border-color);
            padding: 10px;
            /* Make space for menu items so they don't extend beyond the right side of the page */
            padding-right: 60px;
            z-index: 10;
        }

        nav.app-nav.no-badge>ul>li {
            font-weight: bold;
        }

        nav.app-nav.no-badge>ul>li>ul {
            font-weight: normal;
        }

        :root {
            /* Change the theme color hue */
            --theme-hue: 300;

            /* TODO: Attempt to use the customization properties to achieve the same results from the custom CSS above */
            /* See: https://jhildenbiddle.github.io/docsify-themeable/#/customization */

            /* Page actions menu (docsify-page-actions-menu) - blend into dark theme.
           The plugin's --color-mono-* fallbacks resolve to white. It injects its
           own stylesheet AFTER this one, so !important is needed to win the
           cascade and recolor the --dapm-* variables with dark, low-contrast values. */
            --dapm-bg: hsl(201, 18%, 20%) !important;
            --dapm-bg-alt: rgba(255, 255, 255, 0.07) !important;
            --dapm-border-color: rgba(255, 255, 255, 0.12) !important;
            --dapm-text: rgba(255, 255, 255, 0.78) !important;
            --dapm-desc-color: rgba(255, 255, 255, 0.45) !important;
            --dapm-icon-bg: rgba(255, 255, 255, 0.06) !important;
        }

        /* Show only the icon: strip the button chrome (border/padding/background) */
        #page-actions-menu-btn {
            background: transparent !important;
            color: rgba(255, 255, 255, 0.6) !important;
            border: none !important;
            box-shadow: none !important;
            padding: 4px !important;
            gap: 0 !important;
        }

        #page-actions-menu-btn:hover {
            background: transparent !important;
            color: rgba(255, 255, 255, 0.92) !important;
        }

        /* Drop the empty label span so it leaves no gap next to the icon */
        #page-actions-menu-btn>span:not(.page-actions-menu-icon) {
            display: none !important;
        }

        /* Page-actions menu relocated into the navbar (see movePageActionsToNavbar) */
        nav.app-nav li.page-actions-nav-item {
            font-weight: normal;
        }

        nav.app-nav li.page-actions-nav-item #page-actions-menu-container {
            display: inline-flex;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script>
        const fetchText = (url, init) =>
            fetch(url, init).then((response) => response.text());

        const deprecated = (path) =>
            `# Deprecated page\nPlease use the following path instead: [${path}](${path})`;

        window.$docsify = {
            alias: {
                '/.*/_navbar.md': '/_navbar.md',
            },
            // Move the page-actions menu out of the page content and into the top
            // navbar. The plugin injects #page-actions-menu-container at the top of
            // each page; we relocate that node into nav.app-nav > ul on every render.
            // Registered first so the node is in place before the page-actions
            // plugin (re)binds its click handler by element id in its own doneEach.
            plugins: [
                function movePageActionsToNavbar(hook) {
                    hook.doneEach(function () {
                        var navList = document.querySelector('nav.app-nav > ul');
                        if (!navList) return;

                        var containers = document.querySelectorAll(
                            '#page-actions-menu-container',
                        );
                        var fromContent = null;
                        containers.forEach(function (el) {
                            if (!el.closest('nav.app-nav')) fromContent = el;
                        });
                        if (!fromContent) return;

                        // Drop any copy left in the navbar from a previous page render.
                        containers.forEach(function (el) {
                            if (el.closest('nav.app-nav')) el.remove();
                        });

                        var li = document.createElement('li');
                        li.className = 'page-actions-nav-item';
                        li.appendChild(fromContent);
                        navList.appendChild(li);
                    });
                },
            ],
            auto2top: true,
            loadNavbar: true,
            logo: 'logo.png',
            maxLevel: 3,
            mergeNavbar: true,
            name: 'Livery Video Docs',
            nameLink: '/',
            relativePath: true,
            requestHeaders: {
                'cache-control': 'no-cache',
            },
            routerMode: 'history',
            routes: {
                // Load markdown from one of our @liveryvideo/* NPM packages
                '/npm/(.*)': (route, matched, next) => {
                    let path = matched[1];
                    if (path.endsWith('/')) {
                        path += 'index';
                    }
                    fetchText(
                        `https://cdn.jsdelivr.net/npm/@liveryvideo/${path}.md`,
                    ).then(next);
                },

                // Deprecated pages
                '/interactive-bridge-changelog': () =>
                    deprecated('/npm/interactive-bridge/CHANGELOG'),
                '/interactive-sdk': () => deprecated('/interactive-bridge'),
                '/interactive-sdk-changelog': () =>
                    deprecated('/npm/interactive-bridge/CHANGELOG'),
                '/web-player-changelog': () => deprecated('/npm/player/CHANGELOG'),
                '/web-sdk': () => deprecated('/web-player'),
                '/web-sdk-changelog': () => deprecated('/npm/player/CHANGELOG'),

                // Work around notFoundPage not working with routerMode history and server returning index.html instead of 404
                '.*': (route, matched, next) => {
                    const init = { headers: window.$docsify.requestHeaders };
                    fetchText(`${route === '/' ? '/README' : route}.md`, init).then(
                        (text) => {
                            if (text.startsWith('<!DOCTYPE html>')) {
                                fetchText('_404.md', init).then(next);
                            } else {
                                next(text);
                            }
                        },
                    );
                },
            },
            search: {
                depth: 6,
                namespace: 'livery-video-docs',
                paths: [
                    // Make sure to add all paths that should be searchable here
                    '/android-sdk',
                    '/customer-interactive-api',
                    '/customer-video-api',
                    '/embed',
                    '/frictionless-login',
                    '/guides',
                    '/interactive-bridge',
                    '/interactive-portal',
                    '/ios-sdk',
                    '/README',
                    '/security',
                    '/video-ingest',
                    '/video-portal',
                    '/web-player',
                ],
            },
            pageActionItems: {
                button: {
                    label: '',
                },
                items: [
                    {
                        icon: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14.25 5.25H7.25C6.14543 5.25 5.25 6.14543 5.25 7.25V14.25C5.25 15.3546 6.14543 16.25 7.25 16.25H14.25C15.3546 16.25 16.25 15.3546 16.25 14.25V7.25C16.25 6.14543 15.3546 5.25 14.25 5.25Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path><path d="M2.80103 11.998L1.77203 5.07397C1.61003 3.98097 2.36403 2.96397 3.45603 2.80197L10.38 1.77297C11.313 1.63397 12.19 2.16297 12.528 3.00097" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>',
                        label: 'Copy page',
                        desc: 'Copy page as Markdown for LLMs',
                        action: 'copy',
                        onSuccess: 'Copied!',
                        onError: 'Copy failed!',
                    },
                    {
                        icon: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15.25 3.75H2.75C1.64543 3.75 0.75 4.64543 0.75 5.75V12.25C0.75 13.3546 1.64543 14.25 2.75 14.25H15.25C16.3546 14.25 17.25 13.3546 17.25 12.25V5.75C17.25 4.64543 16.3546 3.75 15.25 3.75Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path><path d="M8.75 11.25V6.75H8.356L6.25 9.5L4.144 6.75H3.75V11.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path><path d="M11.5 9.5L13.25 11.25L15 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path><path d="M13.25 11.25V6.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>',
                        label: 'View as Markdown <span style="margin-left:0.25rem;font-size:0.85em;">↗</span>',
                        desc: 'View this page as plain text',
                        action: 'view',
                    },
                    {
                        icon: '<svg fill="currentColor" fill-rule="evenodd" height="18" width="18" viewBox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg"><title>Anthropic</title><path d="M13.827 3.52h3.603L24 20h-3.603l-6.57-16.48zm-7.258 0h3.767L16.906 20h-3.674l-1.343-3.461H5.017l-1.344 3.46H0L6.57 3.522zm4.132 9.959L8.453 7.687 6.205 13.48H10.7z"></path></svg>',
                        label: 'Open in Claude <span style="margin-left:0.25rem;font-size:0.85em;">↗</span>',
                        desc: 'Ask questions about this page',
                        action: 'llm',
                        llm: 'claude',
                    },
                    {
                        icon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><title>OpenAI</title><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"></path></svg>',
                        label: 'Open in ChatGPT <span style="margin-left:0.25rem;font-size:0.85em;">↗</span>',
                        desc: 'Ask questions about this page',
                        action: 'llm',
                        llm: 'chatgpt',
                    },
                    {
                        icon: '<svg width="18" height="18" viewBox="0 0 34 38" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M5.12114 0.0400391L15.919 9.98864V9.98636V0.062995H18.0209V10.0332L28.8671 0.0400391V11.3829H33.3202V27.744H28.8808V37.8442L18.0209 28.303V37.9538H15.919V28.4604L5.13338 37.96V27.744H0.680176V11.3829H5.12114V0.0400391ZM14.3344 13.4592H2.78208V25.6677H5.13074V21.8167L14.3344 13.4592ZM7.23518 22.7379V33.3271L15.919 25.6786V14.8506L7.23518 22.7379ZM18.0814 25.5775V14.8404L26.7677 22.7282V27.744H26.7789V33.219L18.0814 25.5775ZM28.8808 25.6677H31.2183V13.4592H19.752L28.8808 21.7302V25.6677ZM26.7652 11.3829V4.81584L19.6374 11.3829H26.7652ZM14.3507 11.3829H7.22306V4.81584L14.3507 11.3829Z" fill="currentColor"></path></svg>',
                        label: 'Open in Perplexity <span style="margin-left:0.25rem;font-size:0.85em;">↗</span>',
                        desc: 'Ask questions about this page',
                        action: 'llm',
                        llm: 'perplexity',
                    },
                    {
                        icon: '<svg fill="currentColor" height="18" width="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><title>Mistral AI</title><path d="M3.43 3.43h3.42v3.43H3.43zM17.14 3.43h3.43v3.43h-3.43zM3.43 6.86h6.86v3.42H3.43zM13.71 6.86h6.86v3.42h-6.86zM3.43 10.28h17.14v3.43H3.43zM3.43 13.71h3.42v3.43H3.43zM10.28 13.71h3.43v3.43h-3.43zM17.14 13.71h3.43v3.43h-3.43zM3.43 17.14h3.42v3.42H3.43zM17.14 17.14h3.43v3.42h-3.43z"></path></svg>',
                        label: 'Open in Mistral <span style="margin-left:0.25rem;font-size:0.85em;">↗</span>',
                        desc: 'Ask questions about this page',
                        action: 'llm',
                        llm: 'mistral',
                    },
                ],
            },
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- docsify-tabs (latest v1.x.x) -->

    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>

    <script type="module">

        mermaid.initialize({ startOnLoad: true });
        window.mermaid = mermaid;
    </script>
